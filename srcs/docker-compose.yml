# =========================================================
services:
# ---------------------------------------------------------
  nginx:
    container_name: nginx
    image: nginx:inception
    build:
      context: ./requirements/nginx/.
    ports:
     - "443:443"
    depends_on:
      wordpress:
        condition: service_healthy
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    restart: on-failure
  
# ---------------------------------------------------------
  wordpress:
    container_name: wordpress
    image: wordpress:inception
    build:
      context: ./requirements/wordpress/.
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9000 && echo OK || echo FAIL"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    secrets:
      - db_password
      - wp_credentials

# ---------------------------------------------------------
  mariadb:
    container_name: mariadb
    image: mariadb:inception
    build:
      context: ./requirements/mariadb/.
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    env_file:
      - .env
    restart: on-failure
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 1
    secrets:
      - db_password
      - db_root_password

# =========================================================
volumes:
  wordpress:
    name: wordpress_data
    driver: local
    driver_opts:
            device: /home/agallon/data/wordpress
            o: bind
            type: none
  mariadb:
    name: mariadb_data
    driver: local
    driver_opts:
            device: /home/agallon/data/mariadb
            o: bind
            type: none


# =========================================================
networks:
  inception:
    name: inception_net
  

# =========================================================
secrets:
  db_password:
    file: /home/agallon/Desktop/secrets/db_password.txt
  db_root_password:
    file: /home/agallon/Desktop/secrets/db_root_password.txt
  wp_credentials:
    file: /home/agallon/Desktop/secrets/credentials.txt