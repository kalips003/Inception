
services:
# =========================================================
  nginx:
    image: inception-nginx
    build:
      context: ./nginx
    volumes:
      - sharedvolume:/var/www/html
    ports:
      - "443:443"
# =========================================================
  wordpress:
    image: inception-wordpress
    build:
      context: ./wordpress
    volumes:
      - sharedvolume:/var/www/html

# =========================================================
volumes:
  sharedvolume:
    driver: local
  wp_database:

# =========================================================
